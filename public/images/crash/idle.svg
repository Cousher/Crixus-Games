<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
<defs>
  <radialGradient id="glow" cx=".5" cy=".5" r=".5">
    <stop offset="0" stop-color="#FFF3C0" stop-opacity=".6"/>
    <stop offset=".6" stop-color="#FFD24A" stop-opacity=".25"/>
    <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="coinBody" cx=".45" cy=".38" r=".55">
    <stop offset="0" stop-color="#FFF3C0"/>
    <stop offset=".35" stop-color="#FFD24A"/>
    <stop offset=".7" stop-color="#D4AF37"/>
    <stop offset="1" stop-color="#9A7B22"/>
  </radialGradient>
  <linearGradient id="coinEdge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#F6DD8A"/>
    <stop offset="1" stop-color="#7A6318"/>
  </linearGradient>
  <linearGradient id="cSymbol" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFF8E0"/>
    <stop offset="1" stop-color="#C9A832"/>
  </linearGradient>
</defs>

<!-- ambient glow pulse -->
<circle cx="120" cy="120" r="90" fill="url(#glow)">
  <animate attributeName="r" values="85;95;85" dur="2.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values=".5;.85;.5" dur="2.5s" repeatCount="indefinite"/>
</circle>

<!-- gentle float group -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0 -4;0 4;0 -4" dur="2.4s" repeatCount="indefinite"/>

  <!-- coin shadow -->
  <ellipse cx="120" cy="182" rx="38" ry="8" fill="#000" opacity=".18">
    <animate attributeName="ry" values="8;6;8" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".18;.12;.18" dur="2.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- coin body -->
  <circle cx="120" cy="120" r="52" fill="url(#coinBody)" stroke="url(#coinEdge)" stroke-width="4"/>

  <!-- inner ring -->
  <circle cx="120" cy="120" r="40" fill="none" stroke="#F6DD8A" stroke-width="2" opacity=".5"/>

  <!-- C symbol -->
  <text x="120" y="138" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="url(#cSymbol)">C</text>

  <!-- highlight -->
  <ellipse cx="107" cy="102" rx="22" ry="12" fill="#FFF" opacity=".18" transform="rotate(-20 107 102)"/>
</g>

<!-- small sparkle dots -->
<circle cx="72" cy="88" r="2" fill="#FFF8E0" opacity="0">
  <animate attributeName="opacity" values="0;.8;0" dur="3s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle cx="168" cy="96" r="1.5" fill="#FFF8E0" opacity="0">
  <animate attributeName="opacity" values="0;.7;0" dur="3s" repeatCount="indefinite" begin="1s"/>
</circle>
<circle cx="155" cy="152" r="2" fill="#FFF8E0" opacity="0">
  <animate attributeName="opacity" values="0;.6;0" dur="3s" repeatCount="indefinite" begin="2s"/>
</circle>
</svg>
