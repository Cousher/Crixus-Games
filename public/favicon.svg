<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6DD8A"/><stop offset=".5" stop-color="#D4AF37"/><stop offset="1" stop-color="#9A7B22"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8901F"/><stop offset=".5" stop-color="#F6DD8A"/><stop offset="1" stop-color="#B8901F"/>
    </linearGradient>
    <radialGradient id="bg" cx=".5" cy=".42" r=".62">
      <stop offset="0" stop-color="#2a2013"/><stop offset="1" stop-color="#0E0E12"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#gold)" stroke-width="10"/>
  <circle cx="256" cy="256" r="222" fill="none" stroke="#9B1C1C" stroke-width="3" opacity=".85"/>

  <!-- shield -->
  <path d="M256 150 L350 178 Q352 300 256 360 Q160 300 162 178 Z" fill="#14110c" stroke="url(#gold)" stroke-width="7"/>
  <path d="M256 168 L332 190 Q333 290 256 340 Q179 290 180 190 Z" fill="none" stroke="#9B1C1C" stroke-width="6" opacity=".9"/>

  <!-- crossed gladius swords -->
  <g>
    <g transform="rotate(28 256 300)">
      <polygon points="256,96 268,118 268,250 244,250 244,118" fill="url(#steel)" stroke="#6e5a1f" stroke-width="2"/>
      <line x1="256" y1="116" x2="256" y2="246" stroke="#9A7B22" stroke-width="2"/>
      <rect x="222" y="250" width="68" height="15" rx="4" fill="url(#gold)" stroke="#6e5a1f" stroke-width="2"/>
      <rect x="247" y="265" width="18" height="48" rx="4" fill="#6e5a1f"/>
      <circle cx="256" cy="320" r="13" fill="url(#gold)" stroke="#6e5a1f" stroke-width="2"/>
    </g>
    <g transform="rotate(-28 256 300)">
      <polygon points="256,96 268,118 268,250 244,250 244,118" fill="url(#steel)" stroke="#6e5a1f" stroke-width="2"/>
      <line x1="256" y1="116" x2="256" y2="246" stroke="#9A7B22" stroke-width="2"/>
      <rect x="222" y="250" width="68" height="15" rx="4" fill="url(#gold)" stroke="#6e5a1f" stroke-width="2"/>
      <rect x="247" y="265" width="18" height="48" rx="4" fill="#6e5a1f"/>
      <circle cx="256" cy="320" r="13" fill="url(#gold)" stroke="#6e5a1f" stroke-width="2"/>
    </g>
  </g>

  <!-- laurels -->
  <g fill="url(#gold)">
    <g>
      <path d="M150 402 q-24 4 -32 22 q24 2 32 -22z"/><path d="M142 366 q-24 4 -32 22 q24 2 32 -22z"/>
      <path d="M138 330 q-24 4 -32 22 q24 2 32 -22z"/>
    </g>
    <g transform="translate(512,0) scale(-1,1)">
      <path d="M150 402 q-24 4 -32 22 q24 2 32 -22z"/><path d="M142 366 q-24 4 -32 22 q24 2 32 -22z"/>
      <path d="M138 330 q-24 4 -32 22 q24 2 32 -22z"/>
    </g>
  </g>

  <text x="256" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="46" fill="url(#gold)" letter-spacing="7">CRIXUS</text>
</svg>

